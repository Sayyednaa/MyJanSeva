{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{% block title %}My Jan Seva{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'logo.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* Global App Protection */
    body.app-screenshot-blur {
      filter: blur(25px) !important;
      opacity: 0.05 !important;
      transition: filter 0.15s ease, opacity 0.15s ease;
      pointer-events: none !important;
    }
    /* Disable text selection across app except form fields */
    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    input, textarea, select {
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
      user-select: text !important;
    }
    /* Mobile/Tablet touch callout and drag-and-drop prevention */
    body, img, a {
      -webkit-touch-callout: none !important;
    }
    img {
      -webkit-user-drag: none;
      user-drag: none;
    }
  </style>
  <script>
    (function(){
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
<div class="auth-shell">
  <button id="themeToggleBtn" class="auth-theme-btn" aria-label="Toggle theme">
    <i id="themeToggleIcon" class="bi bi-sun-fill"></i>
  </button>

  {% if messages %}
  <div class="toast-stack" style="position:fixed;top:20px;right:20px;z-index:9999;">
    {% for msg in messages %}
    <div class="toast toast--{{ msg.tags }}" role="alert">
      <i class="bi bi-info-circle-fill"></i>
      <span>{{ msg }}</span>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  {% block auth_body %}{% endblock %}
</div>

<script>
document.querySelectorAll('.toast').forEach(function(t){ setTimeout(function(){t.remove();},4000); });

var themeToggleBtn = document.getElementById('themeToggleBtn');
var themeToggleIcon = document.getElementById('themeToggleIcon');

function setTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  if(themeToggleIcon) themeToggleIcon.className = theme === 'light' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
}

var curTheme = document.documentElement.getAttribute('data-theme') || 'dark';
setTheme(curTheme);

if(themeToggleBtn){
  themeToggleBtn.addEventListener('click', function(){
    var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    setTheme(next);
  });
}
</script>
<script>
(function() {
  // Prevent Right-Click
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });

  // Prevent keyboard shortcuts (F12, Print, Save, Inspect)
  document.addEventListener('keydown', function(e) {
    if (
      e.key === 'F12' || e.keyCode === 123 ||
      ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c' || e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) ||
      ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S' || e.key === 'p' || e.key === 'P' || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80))
    ) {
      e.preventDefault();
      e.stopImmediatePropagation();
      return false;
    }
  });

  // Clear clipboard on PrintScreen
  document.addEventListener('keyup', function(e) {
    if (e.key === 'PrintScreen' || e.keyCode === 44) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText('');
      }
      alert('Screenshots are disabled on this application.');
    }
  });

  // Blur page content when it loses focus (preventing snipping tools / screenshots)
  window.addEventListener('blur', function() {
    document.body.classList.add('app-screenshot-blur');
  });
  window.addEventListener('focus', function() {
    document.body.classList.remove('app-screenshot-blur');
  });
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      document.body.classList.add('app-screenshot-blur');
    } else {
      document.body.classList.remove('app-screenshot-blur');
    }
  });
})();
</script>
</body>
</html>
