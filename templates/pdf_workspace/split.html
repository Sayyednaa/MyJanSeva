{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div><h1>Split PDF</h1></div>
  <a href="{% url 'pdf_workspace:home' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:600px">
  <form id="splitForm">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Select PDF to split</label>
      <div class="file-upload-area">
        <input type="file" id="pdfInput" accept=".pdf" required>
        <div class="upload-icon"><i class="bi bi-scissors"></i></div>
        <div class="upload-text">Choose a PDF file</div>
        <div class="upload-sub">Select the file you want to split</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Page Ranges</label>
      <input type="text" id="pagesInput" class="form-control" placeholder="e.g. 1-3, 5, 8-10" required>
      <div class="form-hint" style="color:var(--text-dim);font-size:13px;margin-top:6px">
        Enter page numbers and/or ranges separated by commas. Example: <strong>1-3, 5, 8-10</strong>
      </div>
    </div>
    <div id="progressMsg" class="text-primary text-sm mb-2" style="display:none"></div>
    <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn"><i class="bi bi-download"></i> Split & Download</button>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
document.getElementById('splitForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = document.getElementById('pdfInput').files[0];
    const pagesStr = document.getElementById('pagesInput').value;
    if(!file) return alert('Select a PDF.');
    
    const submitBtn = document.getElementById('submitBtn');
    const msg = document.getElementById('progressMsg');
    submitBtn.disabled = true;
    msg.style.display = 'block';
    
    // Charge wallet
    msg.textContent = 'Verifying wallet balance...';
    let formData = new FormData();
    formData.append('service_slug', 'pdf-split');
    formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
    try {
        let resp = await fetch('{% url "wallet:ajax_charge" %}', {method: 'POST', body: formData});
        let json = await resp.json();
        if(json.status === 'error') throw new Error(json.message);
        
        msg.textContent = 'Splitting PDF...';
        const { PDFDocument } = PDFLib;
        let arrBuffer = await file.arrayBuffer();
        let pdf = await PDFDocument.load(arrBuffer);
        const total = pdf.getPageCount();
        
        let pageIndices = new Set();
        pagesStr.split(',').forEach(part => {
            part = part.trim();
            if(part.includes('-')) {
                let [a, b] = part.split('-');
                let start = parseInt(a) - 1;
                let end = Math.min(parseInt(b), total);
                for(let i=start; i<end; i++) pageIndices.add(i);
            } else {
                let idx = parseInt(part) - 1;
                if(!isNaN(idx) && idx >= 0 && idx < total) pageIndices.add(idx);
            }
        });
        
        if(pageIndices.size === 0) {
            for(let i=0; i<total; i++) pageIndices.add(i);
        }
        
        const zip = new JSZip();
        let indicesArr = Array.from(pageIndices).sort((a,b)=>a-b);
        for(let idx of indicesArr) {
            const newPdf = await PDFDocument.create();
            const [copiedPage] = await newPdf.copyPages(pdf, [idx]);
            newPdf.addPage(copiedPage);
            const pdfBytes = await newPdf.save();
            zip.file(`page_${idx+1}.pdf`, pdfBytes);
        }
        
        msg.textContent = 'Zipping files...';
        const zipBlob = await zip.generateAsync({type:"blob"});
        let link = document.createElement('a');
        link.href = URL.createObjectURL(zipBlob);
        link.download = 'split_pages.zip';
        link.click();
        msg.textContent = 'Done!';
    } catch(err) {
        alert('Error: ' + err.message);
        msg.style.display = 'none';
    } finally {
        submitBtn.disabled = false;
    }
});
</script>
{% endblock %}
