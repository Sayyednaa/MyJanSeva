{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div><h1>PDF Workspace</h1><div class="subtitle">Merge, split, compress, convert & protect PDFs</div></div>
</div>
<div class="action-grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">
  <a href="{% url 'pdf_workspace:merge' %}" class="action-tile">
    <div class="tile-icon" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">📑</div>
    <div class="tile-label">Merge PDFs</div>
  </a>
  <a href="{% url 'pdf_workspace:split' %}" class="action-tile">
    <div class="tile-icon" style="background:linear-gradient(135deg,#06b6d4,#3b82f6)">✂️</div>
    <div class="tile-label">Split PDF</div>
  </a>
  <a href="{% url 'pdf_workspace:compress' %}" class="action-tile">
    <div class="tile-icon" style="background:linear-gradient(135deg,#22c55e,#059669)">📦</div>
    <div class="tile-label">Compress PDF</div>
  </a>
  <a href="{% url 'pdf_workspace:rotate' %}" class="action-tile">
    <div class="tile-icon" style="background:linear-gradient(135deg,#f59e0b,#d97706)">🔄</div>
    <div class="tile-label">Rotate PDF</div>
  </a>
  <a href="{% url 'pdf_workspace:img_to_pdf' %}" class="action-tile">
    <div class="tile-icon" style="background:linear-gradient(135deg,#ec4899,#be185d)">🖼️</div>
    <div class="tile-label">Images → PDF</div>
  </a>
  <a href="{% url 'pdf_workspace:password' %}" class="action-tile">
    <div class="tile-icon" style="background:linear-gradient(135deg,#ef4444,#b91c1c)">🔒</div>
    <div class="tile-label">Password Protect</div>
  </a>
</div>
{% endblock %}
