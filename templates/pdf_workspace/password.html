{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div><h1>Password Protect PDF</h1></div>
  <a href="{% url 'pdf_workspace:home' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:600px">
  <form id="passwordForm">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Select PDF to protect</label>
      <div class="file-upload-area">
        <input type="file" id="pdfInput" accept=".pdf" required>
        <div class="upload-icon"><i class="bi bi-shield-lock"></i></div>
        <div class="upload-text">Choose a PDF file</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Set Password</label>
      <input type="password" id="passwordInput" class="form-control" placeholder="Enter a strong password" required>
    </div>
    <div id="progressMsg" class="text-primary text-sm mb-2" style="display:none"></div>
    <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn"><i class="bi bi-download"></i> Protect & Download</button>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script>
document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = document.getElementById('pdfInput').files[0];
    const password = document.getElementById('passwordInput').value;
    if(!file || !password) return alert('Select a PDF and enter a password.');
    
    const submitBtn = document.getElementById('submitBtn');
    const msg = document.getElementById('progressMsg');
    submitBtn.disabled = true;
    msg.style.display = 'block';
    
    // Charge wallet
    msg.textContent = 'Verifying wallet balance...';
    let formData = new FormData();
    formData.append('service_slug', 'pdf-password'); // assumed slug
    formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
    try {
        let resp = await fetch('{% url "wallet:ajax_charge" %}', {method: 'POST', body: formData});
        let json = await resp.json();
        if(json.status === 'error') throw new Error(json.message);
        
        msg.textContent = 'Encrypting PDF...';
        const { PDFDocument } = PDFLib;
        let arrBuffer = await file.arrayBuffer();
        let pdf = await PDFDocument.load(arrBuffer);
        
        // Note: pdf-lib does not support encryption directly.
        // We will need to use an alternative library or let user know.
        // Since pdf-lib doesn't support writing encrypted PDFs natively right now,
        // we might have to use another library or leave it to backend.
        throw new Error("Client-side encryption is not fully supported by standard open-source libraries (like pdf-lib). Migration might be limited here. Ask admin.");
    } catch(err) {
        alert('Error: ' + err.message);
        msg.style.display = 'none';
    } finally {
        submitBtn.disabled = false;
    }
});
</script>
{% endblock %}
