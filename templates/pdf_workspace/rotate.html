{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div><h1>Rotate PDF</h1></div>
  <a href="{% url 'pdf_workspace:home' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:600px">
  <form id="rotateForm">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Select PDF to rotate</label>
      <div class="file-upload-area">
        <input type="file" id="pdfInput" accept=".pdf" required>
        <div class="upload-icon"><i class="bi bi-arrow-clockwise"></i></div>
        <div class="upload-text">Choose a PDF file</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Rotation Angle</label>
      <select id="angleInput" class="form-control">
        <option value="90">90 Degrees (Clockwise)</option>
        <option value="180">180 Degrees</option>
        <option value="270">270 Degrees (Counter-clockwise)</option>
      </select>
    </div>
    <div id="progressMsg" class="text-primary text-sm mb-2" style="display:none"></div>
    <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn"><i class="bi bi-download"></i> Rotate & Download</button>
  </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script>
document.getElementById('rotateForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = document.getElementById('pdfInput').files[0];
    const angle = parseInt(document.getElementById('angleInput').value);
    if(!file) return alert('Select a PDF.');
    
    const submitBtn = document.getElementById('submitBtn');
    const msg = document.getElementById('progressMsg');
    submitBtn.disabled = true;
    msg.style.display = 'block';
    
    // Charge wallet
    msg.textContent = 'Verifying wallet balance...';
    let formData = new FormData();
    formData.append('service_slug', 'pdf-rotate'); // Assumed slug from views
    formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
    try {
        // Assume free if slug not found, or backend handles it.
        let resp = await fetch('{% url "wallet:ajax_charge" %}', {method: 'POST', body: formData, credentials: 'same-origin'});
        const ct = resp.headers.get('content-type') || '';
        if (!ct.includes('application/json')) { throw new Error('Server error (' + resp.status + '). Please refresh and try again.'); }
        let json = await resp.json();
        if(json.status === 'error') {
            let err = new Error(json.message);
            if (json.code === 'insufficient_balance') {
                err.isInsufficientBalance = true;
                err.redirectUrl = json.redirect_url || '{% url "wallet:topup" %}';
            }
            throw err;
        }
        
        msg.textContent = 'Rotating PDF...';
        const { PDFDocument, degrees } = PDFLib;
        let arrBuffer = await file.arrayBuffer();
        let pdf = await PDFDocument.load(arrBuffer);
        const pages = pdf.getPages();
        pages.forEach(page => {
            page.setRotation(degrees(page.getRotation().angle + angle));
        });
        
        let pdfBytes = await pdf.save();
        let blob = new Blob([pdfBytes], {type: "application/pdf"});
        let link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'rotated.pdf';
        link.click();
        msg.textContent = 'Done!';
    } catch(err) {
        alert('Error: ' + err.message);
        msg.style.display = 'none';
        if (err.isInsufficientBalance) {
            window.location.href = err.redirectUrl;
        }
    } finally {
        submitBtn.disabled = false;
    }
});
</script>
{% endblock %}
